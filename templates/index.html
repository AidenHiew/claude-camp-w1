<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Checker</title>
    <style>
      body { font-family: Arial, sans-serif; background: #eef2f7; color: #222; margin: 0; padding: 0; }
      .page { max-width: 480px; margin: 72px auto; padding: 32px; background: #fff; border-radius: 14px; box-shadow: 0 18px 30px rgba(16, 24, 40, 0.12); }
      h1 { margin-top: 0; }
      form { display: grid; gap: 16px; }
      input[type="text"] { padding: 12px 14px; border: 1px solid #ccd4dd; border-radius: 10px; width: 100%; font-size: 16px; }
      button { padding: 12px 16px; font-size: 16px; border: none; border-radius: 10px; cursor: pointer; background: #2563eb; color: white; }
      .error { color: #b91c1c; background: #fee2e2; border: 1px solid #fecaca; padding: 12px; border-radius: 10px; }
      .note { margin-top: 10px; color: #4b5563; font-size: 14px; }
    </style>
  </head>
  <body>
    <div class="page">
      <h1>Current Weather</h1>
      <p>Enter a city name to see the current weather and icon.</p>
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
      <form action="/weather" method="post">
        <input type="text" name="city" placeholder="e.g. London" autofocus>
        <button type="submit">Check Weather</button>
      </form>
      <p class="note">Tip: Use the full city name and country if needed, e.g. "Paris, FR".</p>
    </div>
  </body>
</html>
